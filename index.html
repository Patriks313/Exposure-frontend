// ============================================================

// --- Type detection (same logic as ISIN Classification) ---
var FUND_KW = ["ETF", "UCITS", "AKTIER IA"];
function isCash(name, isin) {
  return !isin || name.trim().toUpperCase() === "SEK" || name.toLowerCase() === "cash";
}
function isFund(name) {
  return FUND_KW.some(function (k) { return name.toUpperCase().includes(k); });
}

// --- THE COMMON DENOMINATOR: clean a company name down to its core ---
// Reduces a holding name to a comparable company token so the same company
// merges across providers that write names differently. Three stages:
//   v1.1: strip punctuation, legal suffixes (Inc, Corp, Ltd…), share-class markers.
//   v1.6: strip par-value / instrument noise providers append ("USD 0.001",
//         "NPV", "COM"); iShares has no ISIN, so names are its only key.
//   v1.7: expand the standard financial abbreviations L&G uses ("finl"→financial,
//         "svcs"→services, "mgmt"→management, "hldgs"→holdings, "matls"→materials,
//         "sys"→systems, "intl"→international, etc.) to the full word, so L&G's
//         "CISCO SYS INC USD 0.001" lands on iShares' "CISCO SYSTEMS INC".
// Abbreviations are expanded to the FULL word (never truncated), which cannot
// fuse two different companies. Verified on live data: collapses duplicate
// fund-to-fund lines with no overlap lost and no false merges.
// NOTE: a small tail of heavily-truncated names ("DIGITAL RE", "EDWARDS LI",
// "FIDELITY N") still won't merge — expanding 1–2 letter fragments is genuine
// guesswork and risks silent false merges, so it's deliberately left alone.
// The bulletproof endgame for those is resolving iShares tickers → ISINs.
var NAME_ABBR = {
  finl:'financial', svc:'services', svcs:'services', mgmt:'management',
  hldgs:'holdings', hldg:'holdings', hold:'holdings', matls:'materials', matl:'materials',
  sys:'systems', syst:'systems', intl:'international', internatl:'international',
  internati:'international', resh:'research', instrs:'instruments', instr:'instruments',
  inds:'industries', mtrs:'motors', mtr:'motor', mkts:'markets', mkt:'market',
  pwr:'power', prop:'property', props:'properties', cos:'companies', labs:'laboratories',
  entmt:'entertainment', commun:'communications', communic:'communications',
  pmts:'payments', pmt:'payment', diag:'diagnostics', wks:'works', wtr:'water',
  softw:'software', sci:'scientific', technol:'technology', prods:'products',
  chems:'chemicals', mls:'mills', domini:'dominion', ins:'insurance',
  pharm:'pharmaceutical', natl:'national', capit:'capital', sto:'storage', spac:'space',
  solut:'solutions', soln:'solutions'
};
var NAME_DROP = {};
['inc','corp','corporation','co','company','companies','ag','plc','ltd','limited','oyj',
 'abp','asa','sa','nv','se','spa','holding','holdings','group','ord','adr','the','n',
 'class','cl','and','of','reit','del','new',
 'in','cor','shs','sh','stk','sbi','clas'].forEach(function (w) { NAME_DROP[w] = 1; });

function normalise(name) {
  if (!name) return "";
  var s = name.trim().toLowerCase();
  s = s.replace(/\busd\s*[\d.]+/g, " ");        // par value, USD
  s = s.replace(/\b[a-z]{3}\s*[\d.]+/g, " ");   // par value, other currencies (EUR/CHF…)
  s = s.replace(/\bnpv\b/g, " ");               // "no par value"
  s = s.replace(/\bcommon stock\b/g, " ");
  s = s.replace(/\bcom\b/g, " ");               // "common stock" marker
  s = s.replace(/[.,'’"\-\/&+()]/g, " ");       // punctuation incl. parentheses ("(The)")
  var toks = s.split(/\s+/).filter(Boolean)
    .map(function (t) { return NAME_ABBR[t] || t; })   // expand abbreviations
    .filter(function (t) { return !NAME_DROP[t]; })    // drop suffixes / noise words
    .filter(function (t) { return !/^\d+$/.test(t); }) // drop bare numbers
    .map(function (t) {                                // singularise (material(s), system(s)…)
      return (t.length > 4 && t.slice(-1) === "s" && t.slice(-2) !== "ss" && t.slice(-2) !== "us")
        ? t.slice(0, -1) : t;
    })
    .filter(function (t) { return t.length > 1; });    // drop single-letter tokens (share-class A/B/C)
  return toks.join(" ").trim();
}

// --- State ---
var state = {
  funds: {},          // fundIsin -> array of [holdingIsin, name, weightInFund]
  allLoaded: false,   // true once every SPLIT_FUNDS fetch has settled
  loadErr: "",
  view: "all",        // all | overlap
  sort: { col: "total", dir: "desc" }
};

// --- THE MERGE: build exposure by company ---
// Matching (v1.5): a holding is matched to a company by its ISIN when it HAS
// one (the strong identifier — L&G and direct holdings carry ISINs), and falls
// back to the cleaned company name when it doesn't (iShares files have no ISIN).
// Name-cleaning still runs for everything, so share classes (Alphabet A vs C)
// and ISIN-less holdings still merge by name. Cash is the one exception: it
// never merges — it sits in its own bucket, matched neither by ISIN nor name.
function buildExposure(funds) {
  var FUNDS = funds || {};
  var entries = [];          // every company line (deduped); finalised below
  var byIsin = new Map();    // holding ISIN  -> entry
  var byName = new Map();    // cleaned name  -> entry
  var cashEntry = null;

  function touch(name, displayIsin, isCashLine) {
    // Cash: fixed bucket, never indexed, never merged into a company.
    if (isCashLine) {
      if (!cashEntry) {
        cashEntry = { isin: "—", name: name, direct: 0, viaFund: 0 };
        entries.push(cashEntry);
      }
      return cashEntry;
    }
    var nm = normalise(name);
    var ik = (displayIsin && displayIsin.trim()) ? displayIsin.trim() : "";
    var entry = null;
    // 1. Strong match: same ISIN (only holdings that actually carry one).
    if (ik && byIsin.has(ik)) entry = byIsin.get(ik);
    // 2. Fallback match: same cleaned company name.
    if (!entry && nm && byName.has(nm)) entry = byName.get(nm);
    // 3. Otherwise it's a new company.
    if (!entry) {
      entry = { isin: ik || "—", name: name, direct: 0, viaFund: 0 };
      entries.push(entry);
    }
    // Register this holding's identifiers so later holdings find this entry.
    if (ik && !byIsin.has(ik)) byIsin.set(ik, entry);
    if (nm && !byName.has(nm)) byName.set(nm, entry);
    // Surface an ISIN in the table once one is known for this company.
    if ((!entry.isin || entry.isin === "—") && ik) entry.isin = ik;
    return entry;
  }

  // 1. Direct holdings: shares + cash pass straight through.
  //    A fund we WILL split (in SPLIT_FUNDS) is skipped here — it's replaced
  //    below. Any other fund goes to the "not yet split" bucket.
  var notSplitPortW = 0, nNotSplit = 0;
  PORTFOLIO.forEach(function (row) {
    var name = row[0], isin = row[1], w = row[2];
    var cash = isCash(name, isin);
    if (isFund(name) && !cash) {
      if (SPLIT_FUNDS.indexOf(isin.trim()) === -1) { notSplitPortW += w * 100; nNotSplit += 1; }
      return; // fund lines never pass through as themselves
    }
    touch(name, isin, cash).direct += w * 100;
  });

  // 2. Split each fund in SPLIT_FUNDS that the portfolio actually holds.
  //    Each holding's portfolio weight = (weight within fund) × (fund's weight).
  //    Holdings match by ISIN when present, else by cleaned name (see touch()).
  //    A fund whose holdings haven't loaded yet counts as fully undisclosed
  //    for the moment, so the total still ties to 100% while loading.
  var splitFundsInfo = [];        // { name, weight } per split fund
  var splitWeight = 0;
  var totalUndiscPortW = 0;
  SPLIT_FUNDS.forEach(function (fisin) {
    var fundLine = PORTFOLIO.find(function (r) { return r[1].trim() === fisin; });
    if (!fundLine) return;        // portfolio doesn't hold this fund — nothing to split
    var fundWeight = fundLine[2] * 100;
    var holdings = FUNDS[fisin] || [];
    var disclosed = 0;
    holdings.forEach(function (h) {
      var hIsin = h[0], hName = h[1], wInFund = h[2];
      disclosed += wInFund;
      touch(hName, hIsin, false).viaFund += (wInFund / 100) * fundWeight;
    });
    var undiscInFund = 100 - disclosed;
    totalUndiscPortW += (undiscInFund / 100) * fundWeight;
    splitFundsInfo.push({ name: fundLine[0], weight: fundWeight });
    splitWeight += fundWeight;
  });

  // 3. Finalise rows
  var list = entries.map(function (e) {
    return {
      isin: e.isin, name: e.name, direct: e.direct, viaFund: e.viaFund,
      total: e.direct + e.viaFund, overlap: e.direct > 0 && e.viaFund > 0
    };
  });

  list.push({ isin: "—", name: "Undisclosed (inside split funds)",
    direct: 0, viaFund: totalUndiscPortW, total: totalUndiscPortW, overlap: false, isUndisc: true });
  list.push({ isin: "—", name: "Funds not yet split (" + nNotSplit + " funds)",
    direct: 0, viaFund: notSplitPortW, total: notSplitPortW, overlap: false, isNotSplit: true });

  var totals = {
    direct: list.reduce(function (s, r) { return s + r.direct; }, 0),
    viaFund: list.reduce(function (s, r) { return s + r.viaFund; }, 0),
    total: list.reduce(function (s, r) { return s + r.total; }, 0),
    nOverlap: list.filter(function (r) { return r.overlap; }).length,
    nLines: list.length,
    notSplit: notSplitPortW, nNotSplit: nNotSplit,
    splitFundsInfo: splitFundsInfo, nSplit: splitFundsInfo.length, splitWeight: splitWeight
  };
  return { rows: list, totals: totals };
}

// --- Sorting + filtering for display ---
function sortedRows(rows) {
  var filtered = state.view === "overlap" ? rows.filter(function (r) { return r.overlap; }) : rows;
  var main = filtered.filter(function (r) { return !r.isUndisc && !r.isNotSplit; });
  var tail = filtered.filter(function (r) { return r.isUndisc || r.isNotSplit; })
    .sort(function (a, b) { return (a.isUndisc ? 1 : 0) - (b.isUndisc ? 1 : 0); });
  var col = state.sort.col, dir = state.sort.dir;
  main.sort(function (a, b) {
    var cmp;
    if (col === "name" || col === "isin") cmp = String(a[col]).localeCompare(String(b[col]));
    else cmp = a[col] - b[col];
    return dir === "asc" ? cmp : -cmp;
  });
  return main.concat(tail);
}

// --- Render ---
function pct(n) { return n.toFixed(3) + "%"; }
function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

function renderStatus() {
  var el = document.getElementById("status");
  if (!state.allLoaded && !state.loadErr) {
    el.innerHTML =
      '<div class="panel loading"><div class="notice">' +
      'Loading fund holdings from the database… the free backend can take up to ~50 seconds ' +
      'to wake on the first request. Please wait.</div></div>';
  } else if (state.loadErr) {
    el.innerHTML =
      '<div class="panel error"><div class="notice"><strong>Couldn\'t load some fund holdings.</strong> ' +
      esc(state.loadErr) + '</div></div>';
  } else {
    el.innerHTML = "";
  }
}

function sortTh(label, col, numeric) {
  var active = state.sort.col === col;
  var arrow = active ? (state.sort.dir === "asc" ? "▲" : "▼") : "▼";
  return '<th class="sortable' + (numeric ? " num" : "") + (active ? " active" : "") +
    '" data-col="' + col + '">' + label +
    '<span class="sortmark' + (active ? " active" : "") + '">' + arrow + '</span></th>';
}

function render() {
  renderStatus();
  var built = buildExposure(state.funds);
  var rows = built.rows, totals = built.totals;
  var maxTotal = Math.max.apply(null, rows.map(function (r) { return r.total; }));
  var shown = sortedRows(rows);

  var splitNames = totals.splitFundsInfo.map(function (f) { return f.name; }).join(" and ");

  var rowsHtml = shown.map(function (r) {
    var viaColor = r.isUndisc ? "var(--undisc)" : (r.isNotSplit ? "var(--mute)" : "var(--fund)");
    return '<tr class="' + (r.overlap ? "overlap" : "") + '">' +
      '<td>' + esc(r.name) + (r.overlap ? '<span class="tag">OVERLAP</span>' : "") + '</td>' +
      '<td class="isin">' + esc(r.isin) + '</td>' +
      '<td class="num" style="color:' + (r.direct ? "var(--share)" : "var(--line)") + '">' +
        (r.direct ? pct(r.direct) : "—") + '</td>' +
      '<td class="num" style="color:' + (r.viaFund ? viaColor : "var(--line)") + '">' +
        (r.viaFund ? pct(r.viaFund) : "—") + '</td>' +
      '<td class="num" style="font-weight:600">' + pct(r.total) + '</td>' +
      '<td><div class="bar">' +
        '<span style="width:' + (r.direct / maxTotal) * 100 + '%;background:var(--share)"></span>' +
        '<span style="width:' + (r.viaFund / maxTotal) * 100 + '%;background:' + viaColor + '"></span>' +
      '</div></td></tr>';
  }).join("");

  var html =
    // Summary
    '<div class="panel"><h2>What the merge did</h2>' +
    '<div class="hint">' + totals.nSplit + ' fund' + (totals.nSplit === 1 ? "" : "s") + ' split (' +
      totals.splitWeight.toFixed(2) + '% of the portfolio): ' + esc(splitNames) +
      ' — broken into their underlying holdings, read live from the database. The other ' +
      totals.nNotSplit + ' funds aren\'t split yet — they sit in their own honest bucket at the ' +
      'bottom of the table, so the total still ties to 100%.</div>' +
    '<div class="stats">' +
      '<div class="stat"><div class="statK">Exposure lines</div><div class="statV">' + totals.nLines + '</div></div>' +
      '<div class="stat"><div class="statK">Overlaps found</div><div class="statV" style="color:var(--accent)">' + totals.nOverlap + '</div></div>' +
      '<div class="stat"><div class="statK">Seen through</div><div class="statV" style="color:var(--share)">' + (totals.total - totals.notSplit).toFixed(1) + '%</div></div>' +
      '<div class="stat"><div class="statK">Funds not yet split</div><div class="statV" style="color:var(--mute)">' + totals.notSplit.toFixed(1) + '%</div></div>' +
    '</div></div>' +

    // Overlap callout
    '<div class="panel overlapcall"><h2>The hidden overlap</h2>' +
    '<div class="notice">' + totals.nOverlap + ' compan' + (totals.nOverlap === 1 ? "y is" : "ies are") +
      ' held both directly and inside the split funds. Looking at either holding alone understates the ' +
      'real exposure — the roll-up adds them together.</div></div>' +

    // Table
    '<div class="panel"><h2>Exposure by company</h2>' +
    '<div class="hint"><strong>Direct</strong> = held as a share. <strong>Via fund</strong> = look-through ' +
      'from inside the split funds. <strong>Total</strong> = true exposure.</div>' +
    '<div style="margin-bottom:12px">' +
      '<button class="pill' + (state.view === "all" ? " active" : "") + '" data-view="all">All ' +
        rows.length + '</button>' +
      '<button class="pill accent' + (state.view === "overlap" ? " active" : "") + '" data-view="overlap">Overlaps only ' +
        totals.nOverlap + '</button>' +
    '</div>' +
    '<div class="tableBox"><table><thead><tr>' +
      sortTh("Company", "name", false) +
      sortTh("ISIN", "isin", false) +
      sortTh("Direct", "direct", true) +
      sortTh("Via fund", "viaFund", true) +
      sortTh("Total", "total", true) +
      '<th style="width:140px">Share of portfolio</th>' +
    '</tr></thead><tbody>' + rowsHtml + '</tbody>' +
    '<tfoot><tr>' +
      '<td class="serif" style="font-size:14px">Total — ties to 100%</td><td></td>' +
      '<td class="num">' + totals.direct.toFixed(2) + '%</td>' +
      '<td class="num">' + totals.viaFund.toFixed(2) + '%</td>' +
      '<td class="num" style="font-weight:700">' + totals.total.toFixed(2) + '%</td><td></td>' +
    '</tr></tfoot></table></div>' +
    '<div class="foot">Two honest buckets sit at the bottom, kept separate on purpose. ' +
      '<strong>Undisclosed</strong> — the part of the split funds whose holdings weren\'t listed ' +
      '(fund opened, but not fully). <strong>Funds not yet split</strong> — funds we haven\'t looked ' +
      'inside at all yet. Splitting each is the same operation repeated; as more funds are split, this ' +
      'bucket shrinks.</div></div>';

  document.getElementById("content").innerHTML = html;
  wireEvents();
}

function wireEvents() {
  document.querySelectorAll(".pill[data-view]").forEach(function (b) {
    b.addEventListener("click", function () { state.view = b.getAttribute("data-view"); render(); });
  });
  document.querySelectorAll("th.sortable").forEach(function (h) {
    h.addEventListener("click", function () {
      var col = h.getAttribute("data-col");
      if (state.sort.col === col) {
        state.sort.dir = state.sort.dir === "asc" ? "desc" : "asc";
      } else {
        state.sort.col = col;
        state.sort.dir = (col === "name" || col === "isin") ? "asc" : "desc";
      }
      render();
    });
  });
}

// --- Load every split fund's holdings live from the backend, then render ---
function loadFunds() {
  var pending = SPLIT_FUNDS.length;
  if (pending === 0) { state.allLoaded = true; render(); return; }

  SPLIT_FUNDS.forEach(function (fisin) {
    fetch(BACKEND + "/fund-json?isin=" + fisin)
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.error) throw new Error(data.error);
        // Carry each holding's ISIN through (L&G has them; iShares doesn't);
        // the merge matches by ISIN when present, else by cleaned name.
        state.funds[fisin] = (data.holdings || []).map(function (h) {
          var isin = (h.isin && h.isin.trim()) ? h.isin.trim() : "";
          return [isin, h.name, parseFloat(h.weight) || 0];
        });
      })
      .catch(function (e) {
        state.loadErr = (state.loadErr ? state.loadErr + " " : "") +
          (fisin + ": " + (e.message || "could not load"));
      })
      .then(function () {
        pending -= 1;
        if (pending === 0) { state.allLoaded = true; }
        render();
      });
  });
}

// Initial paint (loading state + table built on empty funds), then load.
render();
loadFunds();
</script>
</body>
</html>
